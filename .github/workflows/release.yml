name: "Release Screen Ellophant"

on:
  push:
    tags:
      - 'v*'

jobs:
  publish-tauri:
    permissions:
      contents: write
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: install dependencies
        run: npm install

      - name: build and show signature
        shell: powershell
        run: |
          $env:TAURI_PRIVATE_KEY = "${{ secrets.TAURI_PRIVATE_KEY }}"
          $env:TAURI_KEY_PASSWORD = "${{ secrets.TAURI_KEY_PASSWORD }}"
          npm run tauri build
          
          # Wir suchen die MSI dynamisch, damit der Pfad immer stimmt
          $msiPath = Get-ChildItem -Path "src-tauri/target/release/bundle/msi/*.msi" | Select-Object -ExpandProperty FullName
          Write-Host "Signing file at: $msiPath"
          
          # Jetzt signieren wir mit dem gefundenen Pfad
          npx tauri signer sign -k "$env:TAURI_PRIVATE_KEY" "$msiPath"