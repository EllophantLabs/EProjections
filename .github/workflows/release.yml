name: "Release Screen Ellophant"

on:
  push:
    tags:
      - 'v*'

jobs:
  publish-tauri:
    permissions:
      contents: write
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: install dependencies
        run: npm install

      - name: build and show signature
        shell: powershell
        run: |
          $env:TAURI_PRIVATE_KEY = "${{ secrets.TAURI_PRIVATE_KEY }}"
          $env:TAURI_KEY_PASSWORD = "${{ secrets.TAURI_KEY_PASSWORD }}"
          
          # 1. Build
          npm run tauri build
          
          # 2. Absoluten Pfad zur MSI finden
          $msiFile = Get-ChildItem -Path "src-tauri/target/release/bundle/msi/*.msi" | Select-Object -First 1
          $fullMsiPath = $msiFile.FullName
          Write-Host "Target MSI: $fullMsiPath"
          
          # 3. DIREKTER Aufruf der tauri.cmd (umgeht npm/npx Probleme)
          & "./node_modules/.bin/tauri.cmd" signer sign -k "$env:TAURI_PRIVATE_KEY" "$fullMsiPath"