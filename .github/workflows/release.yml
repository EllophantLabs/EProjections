name: "Release Screen Ellophant"

on:
  push:
    tags:
      - 'v*'

jobs:
  publish-tauri:
    permissions:
      contents: write
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: install dependencies
        run: npm install

      - name: build and show signature
        shell: powershell
        run: |
          $env:TAURI_PRIVATE_KEY = "${{ secrets.TAURI_PRIVATE_KEY }}"
          $env:TAURI_KEY_PASSWORD = "${{ secrets.TAURI_KEY_PASSWORD }}"
          npm run tauri build
          # Die Signatur wird jetzt direkt ins Log geschrieben
          npx tauri signer sign -k "$env:TAURI_PRIVATE_KEY" "src-tauri/target/release/bundle/msi/Screen-Ellophant_0.1.6_x64_en-US.msi"

      - name: create release and upload
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Screen-Ellophant ${{ github.ref_name }}"
          releaseDraft: true
          prerelease: false